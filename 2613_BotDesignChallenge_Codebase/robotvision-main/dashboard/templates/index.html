<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kriti 2026 | Operator Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="logo">
                <div class="logo-icon"></div>
                <span><span class="highlight">KRITI</span> VISION</span>
            </div>
            <div class="timer-section">
                <div class="timer-display" id="run-timer">00:00</div>
                <button id="btn-timer-toggle" class="btn btn-primary">START</button>
            </div>
            <div class="status-indicator">
                <div class="led" id="connection-led"></div>
                <span id="connection-text">Disconnected</span>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Left Column: Camera & Logs -->
            <div class="left-col">
                <section class="glass-panel camera-section">
                    <h2>Live Feed</h2>
                    <div class="camera-feed-container">
                        <img id="camera-feed" src="" alt="Awaiting Video Feed">
                        <div class="camera-overlay">
                            <span class="rec-dot"></span> LIVE REC
                        </div>
                    </div>
                </section>

                <section class="glass-panel logs-section">
                    <h2>System Logs</h2>
                    <div class="logs-container" id="logs">
                        <!-- Logs generated by JS -->
                    </div>
                </section>
            </div>

            <!-- Right Column: Results Grid -->
            <div class="right-col glass-panel results-section">
                <div class="results-header">
                    <h2>Identified Targets</h2>
                    <div class="target-counter"><span id="target-count">0</span> / 16</div>
                </div>
                <div class="images-scroller" id="targets-grid">
                    <!-- Target slots dynamically prepended by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
